<!doctype html>
<html lang="es" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Venus · Recepción</title>
  <link rel="icon" href="/assets/logo.png" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Venus Recepción" />
  <meta name="theme-color" content="#f3eee2" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/recepcion.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/recepcion.html" aria-label="Inicio">
      <img src="/assets/logo.png" alt="" />
      <span class="brand-name">Venus</span>
      <span class="brand-sub">Recepción</span>
    </a>
    <div class="topbar-meta">
      <span id="recClock" class="clock" aria-label="Hora actual">—</span>
      <button class="icon-btn" id="recThemeToggle" title="Cambiar tema" aria-label="Cambiar tema">
        <i class="fa-regular fa-moon theme-dark"></i>
        <i class="fa-regular fa-sun theme-light"></i>
      </button>
      <button class="btn btn-ghost" id="recLogout">
        <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i>
        <span>Salir</span>
      </button>
    </div>
  </header>

  <nav class="tabs" role="tablist" aria-label="Secciones">
    <button class="tab active" data-tab="hoy" role="tab" aria-selected="true">
      <i class="fa-regular fa-sun" aria-hidden="true"></i><span>Hoy</span>
    </button>
    <button class="tab" data-tab="calendario" role="tab">
      <i class="fa-regular fa-calendar" aria-hidden="true"></i><span>Calendario</span>
    </button>
    <button class="tab" data-tab="cobrar" role="tab">
      <i class="fa-solid fa-mug-saucer" aria-hidden="true"></i><span>Cobrar</span>
    </button>
    <button class="tab" data-tab="clientas" role="tab">
      <i class="fa-regular fa-address-card" aria-hidden="true"></i><span>Clientas</span>
    </button>
    <button class="tab" data-tab="whatsapp" role="tab">
      <i class="fa-regular fa-comment" aria-hidden="true"></i><span>Solicitudes</span>
      <span class="tab-badge" id="recReqBadge" hidden>0</span>
    </button>
  </nav>

  <main class="main">

    <!-- ============== HOY ============== -->
    <section data-pane="hoy" class="pane active">
      <header class="pane-head">
        <div>
          <p class="eyebrow" id="recHoyDate">—</p>
          <h1>Hoy</h1>
        </div>
        <button class="btn btn-primary" data-go="nueva-cita">
          <i class="fa-solid fa-plus" aria-hidden="true"></i><span>Nueva cita</span>
        </button>
      </header>

      <section class="kpis" aria-label="Resumen del día" id="recCounters">
        <div class="kpi"><span class="kpi-lbl">Citas</span><span class="kpi-val">—</span></div>
        <div class="kpi"><span class="kpi-lbl">Llegaron</span><span class="kpi-val">—</span></div>
        <div class="kpi"><span class="kpi-lbl">Pendientes</span><span class="kpi-val">—</span></div>
      </section>

      <ol class="list" id="recCitasHoy" aria-label="Citas de hoy"></ol>
    </section>

    <!-- ============== CALENDARIO ============== -->
    <section data-pane="calendario" class="pane">
      <header class="pane-head">
        <div>
          <p class="eyebrow">Citas por día</p>
          <h1>Calendario</h1>
        </div>
        <button class="btn btn-primary" data-go="nueva-cita">
          <i class="fa-solid fa-plus" aria-hidden="true"></i><span>Nueva cita</span>
        </button>
      </header>

      <div class="viewbar" role="tablist" aria-label="Modo de vista">
        <button class="view-btn active" data-view="day" role="tab" aria-selected="true">Día</button>
        <button class="view-btn" data-view="week" role="tab" aria-selected="false">Semana</button>
        <button class="view-btn" data-view="month" role="tab" aria-selected="false">Mes</button>
      </div>

      <div class="datebar" role="group" aria-label="Selector de fecha">
        <button class="icon-btn" id="recDatePrev" aria-label="Anterior"><i class="fa-solid fa-chevron-left"></i></button>
        <input type="date" id="recDatePick" class="input input-date" aria-label="Fecha" />
        <span id="recRangeLabel" class="range-label" hidden></span>
        <button class="icon-btn" id="recDateNext" aria-label="Siguiente"><i class="fa-solid fa-chevron-right"></i></button>
        <button class="btn btn-ghost btn-sm" id="recDateToday">Hoy</button>
      </div>

      <section class="kpis" id="recCalCounters" aria-label="Resumen del periodo seleccionado"></section>

      <!-- Vista Día -->
      <ol class="list" id="recCitasCal"></ol>

      <!-- Vista Semana (lun-dom, 7 columnas) -->
      <div class="week-grid" id="recWeekGrid" hidden></div>

      <!-- Vista Mes (cuadrícula tradicional) -->
      <div class="month-grid" id="recMonthGrid" hidden></div>
    </section>

    <!-- ============== COBRAR ============== -->
    <section data-pane="cobrar" class="pane">
      <header class="pane-head">
        <div>
          <p class="eyebrow">Cafetería</p>
          <h1>Cobrar</h1>
        </div>
      </header>
      <iframe id="recPosFrame" data-src="/coffee-pos.html?role=recepcion" class="pos-frame" title="Punto de venta"></iframe>
    </section>

    <!-- ============== CLIENTAS ============== -->
    <section data-pane="clientas" class="pane">
      <header class="pane-head">
        <div>
          <p class="eyebrow">Lealtad y datos</p>
          <h1>Clientas</h1>
        </div>
      </header>

      <div class="searchbar">
        <i class="fa-solid fa-magnifying-glass search-icon" aria-hidden="true"></i>
        <input type="search" id="recCardSearch" class="input input-search" placeholder="Buscar por nombre o teléfono" autocomplete="off" />
      </div>

      <div class="clientas-grid" id="recCardsList"></div>
      <div class="pager">
        <button class="btn btn-ghost btn-sm" id="recCardsPrev"><i class="fa-solid fa-chevron-left"></i><span>Anterior</span></button>
        <span id="recCardsPage" class="pager-info">—</span>
        <button class="btn btn-ghost btn-sm" id="recCardsNext"><span>Siguiente</span><i class="fa-solid fa-chevron-right"></i></button>
      </div>
    </section>

    <!-- ============== SOLICITUDES ============== -->
    <section data-pane="whatsapp" class="pane">
      <header class="pane-head">
        <div>
          <p class="eyebrow">Pendientes</p>
          <h1>Solicitudes</h1>
        </div>
        <button class="btn btn-ghost" id="recReqRefresh">
          <i class="fa-solid fa-rotate-right" aria-hidden="true"></i><span>Actualizar</span>
        </button>
      </header>
      <ol class="list" id="recRequests"></ol>
    </section>

  </main>

  <!-- ============== MODAL: NUEVA CITA ============== -->
  <dialog id="recApptDialog" class="dialog">
    <form method="dialog" class="dialog-body" id="recApptForm">
      <header class="dialog-head">
        <div>
          <p class="eyebrow">Agenda</p>
          <h2>Nueva cita</h2>
        </div>
        <button type="button" class="icon-btn" id="recApptCancel" aria-label="Cerrar"><i class="fa-solid fa-xmark"></i></button>
      </header>

      <label class="field">
        <span>Nombre de la clienta</span>
        <input type="text" id="recApptName" class="input" autocomplete="off" required placeholder="Escribe para buscar o crear" />
        <div class="suggest" id="recApptSuggest" role="listbox"></div>
      </label>

      <label class="field">
        <span>Teléfono</span>
        <input type="tel" id="recApptPhone" class="input" inputmode="numeric" placeholder="4271234567" required />
      </label>

      <label class="field">
        <span>Servicio</span>
        <select id="recApptService" class="input" required></select>
      </label>

      <div class="field-row">
        <label class="field">
          <span>Fecha</span>
          <input type="date" id="recApptDate" class="input" required />
        </label>
        <label class="field">
          <span>Hora</span>
          <input type="time" id="recApptTime" class="input" step="900" required />
        </label>
      </div>

      <p class="dialog-err" id="recApptErr" hidden></p>

      <div class="dialog-actions">
        <button type="button" class="btn btn-ghost" id="recApptCancel2">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="recApptSave">
          <i class="fa-regular fa-calendar-plus" aria-hidden="true"></i><span>Agendar</span>
        </button>
      </div>
    </form>
  </dialog>

  <script src="/recepcion.js" type="module"></script>
</body>
</html>
